name: Auto Update Phone Prices

on:
  schedule:
    - cron: '*/10 * * * *'  # هر 10 دقیقه
  workflow_dispatch:        # اجرای دستی
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run price tracker
      run: python price_tracker.py
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        
    - name: Display results
      run: |
        echo "✅ Phone prices updated successfully!"
        echo "📱 Check your site at: https://mohamadhoseinsaadat79-alt.github.io/phone-prices/"
